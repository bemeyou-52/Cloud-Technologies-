<!DOCTYPE html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус группы</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        :root {
            --bg: #0f0f13;
            --surface: #18181f;
            --surface2: #1f1f2a;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f5;
            --text-muted: #7a7a90;
            --accent: #7c6dfa;
            --accent2: #fa6d6d;
            --study: #4ade80;
            --coffee: #fbbf24;
            --game: #38bdf8;
            --home: #94a3b8;
            --radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #e8eaed;
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            padding: 40px 16px 60px;
            color: var(--text);
        }

        /* Фон — сетка */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,109,250,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,109,250,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* Заголовок */
        .app-header {
            text-align: center;
            padding: 8px 0 4px;
        }

        .app-header h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Карточки */
        .card {
            background: #ffffff;
            border-radius: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .card h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(124,109,250,0.5), transparent);
        }

        #myInfo {
            font-size: 14px;
            color: #444;
            margin-bottom: 16px;
        .card-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 18px;
        }

        .google-login, .google-logout {
            padding: 12px 26px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        /* Профиль */
        .profile-block {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding: 14px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border);
            min-height: 62px;
        }

        .google-login {
            color: #222;
            background: linear-gradient(135deg, #ffd84d, #ffb300);
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .google-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
        .profile-info strong {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .google-login:active {
            transform: translateY(1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        .profile-info small {
            font-size: 12px;
            color: var(--text-muted);
        }

        .google-logout {
            color: #fff;
            background: linear-gradient(135deg, #ff4b5c, #d80032);
            margin-top: 10px;
        /* Auth кнопки */
        .auth-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .google-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
        .btn-login {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            transition: opacity 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .google-logout:active {
            transform: translateY(1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        .btn-login:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(1px); }

        .btn-logout {
            padding: 12px 18px;
            border: 1px solid rgba(250,109,109,0.3);
            border-radius: 12px;
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(250,109,109,0.1);
            color: var(--accent2);
            transition: background 0.2s;
        }

        .btn-logout:hover { background: rgba(250,109,109,0.2); }

        /* Статусы */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-btn {
            padding: 14px 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            padding: 16px 10px;
            border: 1px solid transparent;
            border-radius: 14px;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.15s, transform 0.1s;
            color: #fff;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            position: relative;
            overflow: hidden;
        }

        .status-btn:hover {
            opacity: 0.88;
            transform: scale(0.98);
        .status-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }

        .status-btn:active {
            transform: scale(0.95);
        .status-btn:hover::after { background: rgba(255,255,255,0.06); }
        .status-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .status-btn:active { transform: translateY(1px); box-shadow: none; }

        .btn-study {
            background: rgba(74,222,128,0.1);
            border-color: rgba(74,222,128,0.25);
            color: var(--study);
        }
        .btn-coffee {
            background: rgba(251,191,36,0.1);
            border-color: rgba(251,191,36,0.25);
            color: var(--coffee);
        }
        .btn-game {
            background: rgba(56,189,248,0.1);
            border-color: rgba(56,189,248,0.25);
            color: var(--game);
        }
        .btn-home {
            background: rgba(148,163,184,0.1);
            border-color: rgba(148,163,184,0.25);
            color: var(--home);
        }

        .btn-study  { background: #3cb54a; }
        .btn-coffee { background: #f5a623; border: 2px solid #d4861a; }
        .btn-game   { background: #00b5ad; }
        .btn-home   { background: #888888; }
        .status-btn.active {
            box-shadow: 0 0 0 2px currentColor, 0 8px 20px rgba(0,0,0,0.25);
        }

        /* Список группы */
        #groupList {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
            gap: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: border-color 0.3s;
            animation: fadeIn 0.3s ease;
        }

        .status-dot {
            width: 14px;
            height: 14px;
        .user-item:hover { border-color: rgba(124,109,250,0.2); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }

        .user-item strong {
            font-size: 15px;
            color: #1a1a1a;
            display: block;
        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            flex: 1;
        }

        .user-item small {
            font-size: 13px;
            color: #666;
        .user-status {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* Pulse для текущего пользователя */
        .is-me .user-dot {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Обновление */
        .refresh-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
        }

        .last-updated {
            font-size: 11px;
            color: var(--text-muted);
        }

        .refresh-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--study);
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0; }
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, var(--surface2) 25%, rgba(255,255,255,0.04) 50%, var(--surface2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 44px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .hidden { display: none !important; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

            document.getElementById('myInfo').innerText = "Вы вышли";
            document.querySelector('.google-login').style.display = "inline-block";
            document.querySelector('.google-logout').style.display = "none";
        // Авто-регистрация в profiles при первом входе
        async function upsertProfile(user) {
            const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь';
            await supabase.from('profiles').upsert({
                id: user.id,
                username: name,
                status: '🏠 Дома',
                color: '#94a3b8'
            }, { onConflict: 'id', ignoreDuplicates: true });
        }

        // Автообновление интерфейса при входе/выходе
        supabase.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                document.getElementById('myInfo').innerText = `Вы зашли как: ${session.user.email}`;
                document.querySelector('.google-login').style.display = "none";
                document.querySelector('.google-logout').style.display = "inline-block";
        // Слушатель авторизации
        supabase.auth.onAuthStateChange(async (event, session) => {
            if (session?.user) {
                currentUser = session.user;
                await upsertProfile(currentUser);
                updateProfileUI(currentUser);
                fetchGroup();
            } else {
                document.getElementById('myInfo').innerText = "Вы не вошли";
                document.querySelector('.google-login').style.display = "inline-block";
                document.querySelector('.google-logout').style.display = "none";
                currentUser = null;
                updateProfileUI(null);
            }
        });

        // Первый запуск
        fetchGroup();
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
