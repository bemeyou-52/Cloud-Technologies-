<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Группа · Монитор</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f0f2f8;
  --card:    #ffffff;
  --border:  #e4e7f0;
  --text:    #1a1d2e;
  --muted:   #8b8fa8;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #f59e0b;
  --blue:    #3b82f6;
  --purple:  #8b5cf6;
  --radius:  18px;
  --shadow:  0 2px 20px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Golos Text', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px 60px;
  color: var(--text);
}
.wrap { width:100%; max-width:420px; display:flex; flex-direction:column; gap:14px; }

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  display:flex; align-items:center; gap:8px;
  padding: 13px 18px;
  font-family: 'Unbounded', sans-serif;
  font-size: 11px; font-weight:700; letter-spacing:.5px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}

/* LOGIN */
#loginScreen {
  text-align:center;
  padding: 44px 24px;
}
#loginScreen .logo { font-size:52px; margin-bottom:14px; }
#loginScreen h2 {
  font-family:'Unbounded',sans-serif; font-size:19px; font-weight:900;
  margin-bottom:8px;
}
#loginScreen p { font-size:13px; color:var(--muted); line-height:1.55; margin-bottom:28px; }
.btn-google {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:13px 20px;
  background:#1a1d2e; color:#fff; border:none; border-radius:12px;
  font-family:'Golos Text',sans-serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:opacity .2s, transform .15s;
}
.btn-google:hover { opacity:.85; transform:translateY(-1px); }

/* USER HEADER */
.user-header {
  display:flex; align-items:center; gap:12px;
  padding:16px 18px 0;
}
.avatar {
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0; position:relative;
}
.avatar .odot {
  position:absolute; bottom:1px; right:1px;
  width:11px; height:11px; border-radius:50%;
  background:var(--green); border:2px solid var(--card);
}
.uname { font-size:15px; font-weight:700; }
.ustatus { font-size:12px; color:var(--muted); margin-top:2px; }

/* BIG TIMER */
.timer-block {
  text-align:center;
  padding: 18px 18px 10px;
}
.timer-ico { font-size:30px; display:block; margin-bottom:4px; }
.timer-ico.spin { animation: spin 3s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.timer-ico.swing { animation: swing 1.8s ease-in-out infinite; }
@keyframes swing { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }

.timer-val {
  font-family:'Unbounded',sans-serif;
  font-size:40px; font-weight:900; letter-spacing:-2px;
  font-variant-numeric:tabular-nums;
  transition: color .3s;
}
.timer-label { font-size:12px; color:var(--muted); margin-top:4px; }

/* ACTIVITY BUTTONS */
.activity-section { padding:14px 18px; }
.activity-title {
  font-size:11px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px;
}
.activity-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.act-btn {
  padding:14px 10px;
  border-radius:14px; border:2px solid transparent;
  font-family:'Golos Text',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px;
  transition:transform .15s, box-shadow .2s, border-color .2s;
  position:relative; overflow:hidden;
}
.act-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.12); }
.act-btn:active { transform:translateY(0); }
.act-btn.active {
  border-color: currentColor !important;
  box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 20%, transparent) !important;
}

.act-study  { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
.act-hw     { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
.act-coffee { background:#fffbeb; color:#92400e; border-color:#fde68a; }
.act-game   { background:#f5f3ff; color:#6d28d9; border-color:#ddd6fe; }

/* CONTROL BUTTONS */
.ctrl-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 18px 18px; }
.ctrl-btn {
  padding:12px 10px;
  border-radius:12px; border:none;
  font-family:'Golos Text',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px;
  transition:filter .2s, transform .15s;
}
.ctrl-btn:hover { filter:brightness(.93); transform:translateY(-1px); }
.ctrl-btn:active { transform:translateY(0); }
.ctrl-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

.btn-pause  { background:#fffbeb; color:#92400e; border:1.5px solid #fde68a; }
.btn-end    { background:#fef2f2; color:#991b1b; border:1.5px solid #fecaca; }
.btn-logout { background:#f1f5f9; color:var(--muted); border:1.5px solid var(--border); }
.btn-start  { background:var(--green); color:#fff; }

/* GROUP */
.online-bar {
  display:flex; align-items:center; gap:7px;
  padding:10px 18px 4px;
  font-size:12px; font-weight:700; color:#15803d;
}
.pulse-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--green);
  animation:pulse-g 2s infinite;
}
@keyframes pulse-g {
  0%,100%{ box-shadow:0 0 0 0 rgba(34,197,94,.45); }
  50%    { box-shadow:0 0 0 6px rgba(34,197,94,0); }
}
#memberList { display:flex; flex-direction:column; gap:8px; padding:10px 18px; }
.mrow {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; background:var(--bg);
  border-radius:11px; border:1px solid var(--border);
  animation:fadeUp .25s ease;
}
.mrow.online-row { border-color:#bbf7d0; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

.mdot-wrap { width:14px; height:14px; position:relative; flex-shrink:0; }
.mdot { width:10px; height:10px; border-radius:50%; position:absolute; top:2px; left:2px; }
.mdot-ripple {
  position:absolute; inset:-2px; border-radius:50%;
  border:1.5px solid; opacity:0;
}
.mdot-ripple.on { animation:ripple 2s infinite; }
@keyframes ripple { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2.6);opacity:0} }

.mname { font-size:13px; font-weight:600; flex:1; }
.me-tag { font-size:10px; color:var(--blue); font-weight:700; margin-left:4px; }
.online-tag {
  font-size:9px; font-weight:700;
  background:#f0fdf4; color:#15803d;
  padding:1px 6px; border-radius:8px;
  border:1px solid #bbf7d0; margin-left:4px;
}
.mright { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.mstatus { font-size:11px; color:var(--muted); }
.mtimer { font-size:11px; font-weight:700; color:var(--green); font-variant-numeric:tabular-nums; display:none; }
.mtimer.show { display:block; }

.refresh-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 18px 14px;
}
.refresh-row span { font-size:11px; color:var(--muted); }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 2.5s infinite; }
@keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0} }

.skeleton {
  height:44px; border-radius:10px;
  background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* CHAT */
.chat-messages {
  height:200px; overflow-y:auto;
  padding:14px 18px 8px;
  display:flex; flex-direction:column; gap:8px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.chat-messages::-webkit-scrollbar { width:4px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.cmsg { animation:fadeUp .25s ease; }
.cmsg .cauthor { font-size:11px; font-weight:700; color:var(--blue); margin-bottom:2px; }
.cmsg.mine .cauthor { color:var(--green); text-align:right; }
.cmsg.mine .cbubble { margin-left:auto; background:#f0fdf4; border-color:#bbf7d0; }
.cbubble {
  display:inline-block; max-width:88%;
  padding:7px 12px; background:var(--bg);
  border:1px solid var(--border); border-radius:10px;
  font-size:13px; line-height:1.4; word-break:break-word;
}
.chat-input-row {
  display:flex; gap:8px;
  padding:10px 14px 14px;
  border-top:1px solid var(--border);
}
.chat-input {
  flex:1; padding:10px 14px;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'Golos Text',sans-serif; font-size:13px;
  background:var(--bg); color:var(--text); outline:none;
  transition:border-color .2s;
}
.chat-input::placeholder { color:var(--muted); }
.chat-input:focus { border-color:#94a3b8; }
.btn-send {
  width:40px; height:40px; border:none; border-radius:10px;
  background:var(--green); color:#fff; font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:filter .2s, transform .15s;
}
.btn-send:hover { filter:brightness(.9); transform:scale(1.05); }
.btn-send:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.chat-empty { text-align:center; color:var(--muted); font-size:13px; padding:32px 0; }



/* TOAST */
#toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--text); color:#fff;
  padding:10px 20px; border-radius:10px;
  font-size:13px; font-weight:600;
  opacity:0; transition:all .25s;
  pointer-events:none; z-index:999; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.hidden { display:none !important; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── LOGIN ── -->
  <div class="card" id="loginScreen">
    <div class="logo">🎓</div>
    <h2>Монитор группы</h2>
    <p>Выбирай чем занимаешься — запускается таймер.<br>Видишь что делают остальные. Общайтесь в чате.</p>
    <button class="btn-google" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z" fill="#FFC107"/>
        <path d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 7.5 29.6 5 24 5 16.2 5 9.4 9.1 6.3 14.7z" fill="#FF3D00"/>
        <path d="M24 44c5.5 0 10.4-2 14.1-5.2l-6.5-5.5C29.6 35.1 26.9 36 24 36c-5.3 0-9.7-3.3-11.4-8H6.1C9.2 34.9 16 40 24 40v4z" fill="#4CAF50"/>
        <path d="M43.6 20.5H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.6 5.9l6.5 5.5C37 39 44 34 44 24c0-1.2-.1-2.4-.4-3.5z" fill="#1976D2"/>
      </svg>
      Войти через Google
    </button>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="mainApp" class="hidden">

    <!-- Timer card -->
    <div class="card">
      <div class="user-header">
        <div class="avatar" id="avatarEmoji">🦊<div class="odot"></div></div>
        <div>
          <div class="uname" id="myName">—</div>
          <div class="ustatus" id="myStatusText">Выбери действие ниже</div>
        </div>
      </div>

      <div class="timer-block">
        <span class="timer-ico" id="timerIco">⏱</span>
        <div class="timer-val" id="timerVal" style="color:var(--muted);">0 сек.</div>
        <div class="timer-label" id="timerLabel">Нет активной сессии</div>
      </div>

      <!-- Activity chooser -->
      <div class="activity-section">
        <div class="activity-title">Чем занимаешься?</div>
        <div class="activity-grid">
          <button class="act-btn act-study"  id="act-study"  onclick="pickActivity('📚 Учусь','#22c55e','study',  this)">📚 Учусь</button>
          <button class="act-btn act-hw"     id="act-hw"     onclick="pickActivity('📝 Делаю ДЗ','#3b82f6','hw', this)">📝 Делаю ДЗ</button>
          <button class="act-btn act-coffee" id="act-coffee" onclick="pickActivity('☕ Пью кофе','#f59e0b','coffee',this)">☕ Пью кофе</button>
          <button class="act-btn act-game"   id="act-game"   onclick="pickActivity('🎮 Играю','#8b5cf6','game',   this)">🎮 Играю</button>
        </div>
      </div>

      <!-- Controls: pause / end / logout -->
      <div class="ctrl-row">
        <button class="ctrl-btn btn-pause" id="btnPause" onclick="togglePause()" disabled>
          ☕ Перерыв
        </button>
        <button class="ctrl-btn btn-end" id="btnEnd" onclick="endSession()" disabled>
          ⛔ Завершить
        </button>
      </div>
      <div style="padding:0 18px 18px;">
        <button class="ctrl-btn btn-logout" style="width:100%;" onclick="doLogout()">🚪 Выход</button>
      </div>
    </div>

    <!-- Group monitor -->
    <div class="card">
      <div class="card-head">👥 Монитор группы</div>
      <div class="online-bar">
        <div class="pulse-dot"></div>
        <span id="onlineCount">0 онлайн</span>
      </div>
      <div id="memberList">
        <div style="padding:6px 0;"><div class="skeleton"></div></div>
        <div style="padding:4px 0;"><div class="skeleton"></div></div>
      </div>
      <div class="refresh-row">
        <span id="lastUpdated">Загрузка...</span>
        <div class="live-dot"></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="card">
      <div class="card-head">💬 Общий чат</div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">Сообщений пока нет</div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput"
               placeholder="Сообщение..."
               onkeydown="if(event.key==='Enter')sendMsg()"
               maxlength="300">
        <button class="btn-send" id="btnSend" onclick="sendMsg()">➤</button>
      </div>
    </div>



  </div><!-- /mainApp -->
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://rvsatjlrxvbrnwzyhuip.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2c2F0amxyeHZicm53enlodWlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzcxMjAsImV4cCI6MjA4ODk1MzEyMH0.k18RyeTEL_UySmgeSIIQ__-Ko_fQ4HnbXsPQtVaM0E0';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const ONLINE_MS    = 15000;
const HB_MS        = 8000;
const REFRESH_MS   = 5000;
const EMOJIS = ['🦊','🐼','🦁','🐨','🦋','🐙','🦄','🐸','🐯','🦝'];

let me = null;
let sessionStart  = null;   // Date when current activity started
let paused        = false;  // перерыв?
let pausedAt      = null;   // Date when paused
let pausedTotal   = 0;      // total paused ms (before current pause)
let currentAct    = null;   // 'study'|'hw'|'coffee'|'game'|null
let memberTimers  = {};
let hbTimer       = null;
let chatSub       = null;

/* ── UTILS ─────────────────────────────────── */
const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nowIso = () => new Date().toISOString();

function fmt(sec) {
  if (sec < 60) return `${sec} сек.`;
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return h > 0 ? `${h}ч ${m}м ${s}с` : `${m}м ${s}с`;
}
function fmtShort(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return `${h}ч ${m}м ${s}с`;
}

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2300);
}

/* ── TIMER TICK (every second) ─────────────── */
const ACT_COLORS = { study:'#22c55e', hw:'#3b82f6', coffee:'#f59e0b', game:'#8b5cf6' };
const ACT_ICOS   = { study:'swing', hw:'swing', coffee:'spin', game:'swing' };
const ACT_ICO_CH = { study:'📚', hw:'📝', coffee:'☕', game:'🎮' };

setInterval(() => {
  // My timer
  if (sessionStart && !paused) {
    const elapsed = Math.floor((Date.now() - sessionStart.getTime() - pausedTotal) / 1000);
    $('timerVal').textContent = fmt(elapsed);
  }
  // Group member timers
  for (const [uid, start] of Object.entries(memberTimers)) {
    const el = document.getElementById(`mt-${uid}`);
    if (!el) continue;
    const elapsed = Math.floor((Date.now() - start.getTime()) / 1000);
    el.textContent = '⏱ ' + fmtShort(elapsed);
  }
}, 1000);

/* ── AUTH ──────────────────────────────────── */
window.doLogin = async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google', options: { redirectTo: window.location.href }
  });
  if (error) { toast('❌ Ошибка входа'); console.error(error); }
};

window.doLogout = async () => {
  if (me) {
    await sb.from('profiles').update({
      status:'🏠 Дома', color:'#94a3b8',
      last_seen: null, session_started_at: null
    }).eq('id', me.id);
  }
  await sb.auth.signOut();
  resetState();
  $('loginScreen').classList.remove('hidden');
  $('mainApp').classList.add('hidden');
};

function resetState() {
  me = null; sessionStart = null; paused = false;
  pausedAt = null; pausedTotal = 0; currentAct = null;
  clearInterval(hbTimer);
  if (chatSub) { chatSub.unsubscribe(); chatSub = null; }
}

/* ── BOOT ──────────────────────────────────── */
(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session?.user) { me = session.user; await initApp(); }
})();

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user && !me) { me = session.user; await initApp(); }
});

/* ── INIT ──────────────────────────────────── */
async function initApp() {
  $('loginScreen').classList.add('hidden');
  $('mainApp').classList.remove('hidden');

  const name = me.user_metadata?.full_name || me.email?.split('@')[0] || 'Пользователь';
  const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  $('avatarEmoji').innerHTML = emoji + '<div class="odot"></div>';
  $('myName').textContent = name;

  // Upsert profile
  await sb.from('profiles').upsert({
    id: me.id, username: name,
    status: '🏠 Дома', color: '#94a3b8',
    last_seen: nowIso()
  }, { onConflict: 'id', ignoreDuplicates: true });

  // Restore state if was active
  const { data: prof } = await sb.from('profiles').select('*').eq('id', me.id).single();
  if (prof?.session_started_at && prof.status && prof.status !== '🏠 Дома') {
    sessionStart = new Date(prof.session_started_at);
    pausedTotal  = 0;
    const actKey = statusToKey(prof.status);
    if (actKey) { currentAct = actKey; restoreActivityUI(actKey); }
  }

  // Heartbeat
  clearInterval(hbTimer);
  hbTimer = setInterval(heartbeat, HB_MS);
  heartbeat();

  // Group + chat
  fetchGroup();
  setInterval(fetchGroup, REFRESH_MS);
  loadChat();
  subscribeChatRealtime();
}

function statusToKey(status) {
  if (status?.includes('Учусь'))  return 'study';
  if (status?.includes('ДЗ'))     return 'hw';
  if (status?.includes('кофе') || status?.includes('Кофе')) return 'coffee';
  if (status?.includes('Играю'))  return 'game';
  return null;
}

function restoreActivityUI(key) {
  // Click the right button visually
  const map = { study:'act-study', hw:'act-hw', coffee:'act-coffee', game:'act-game' };
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
  const btn = $(map[key]);
  if (btn) btn.classList.add('active');
  setTimerUI(key, false);
  enableControls();
}

/* ── HEARTBEAT ─────────────────────────────── */
async function heartbeat() {
  if (!me) return;
  await sb.from('profiles').update({ last_seen: nowIso() }).eq('id', me.id);
}

/* ── ACTIVITY PICK ─────────────────────────── */
window.pickActivity = async (label, color, key, btn) => {
  if (!me) { toast('⚠️ Войдите в аккаунт'); return; }

  // If same activity — do nothing (already running)
  if (currentAct === key && !paused) {
    toast('Уже идёт!'); return;
  }

  // If was paused and picks same — resume
  if (currentAct === key && paused) {
    resumeFromPause(); return;
  }

  // New activity: start fresh
  currentAct   = key;
  sessionStart = new Date();
  pausedTotal  = 0;
  paused       = false;
  pausedAt     = null;

  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  await sb.from('profiles').update({
    status: label, color,
    session_started_at: sessionStart.toISOString(),
    last_seen: nowIso()
  }).eq('id', me.id);

  setTimerUI(key, false);
  enableControls();
  toast(`▶ ${label}`);
  fetchGroup();
};

/* ── PAUSE ─────────────────────────────────── */
window.togglePause = async () => {
  if (!me || !currentAct) return;
  if (!paused) {
    // Pause
    paused   = true;
    pausedAt = new Date();
    $('btnPause').textContent = '▶ Продолжить';
    $('timerLabel').textContent = 'На паузе · нажми «Продолжить»';
    $('timerVal').style.color = '#f59e0b';
    $('timerIco').className = 'timer-ico';
    $('timerIco').textContent = '☕';
    await sb.from('profiles').update({
      status: '☕ Перерыв', color: '#f59e0b', last_seen: nowIso()
    }).eq('id', me.id);
    toast('☕ Перерыв');
  } else {
    resumeFromPause();
  }
  fetchGroup();
};

async function resumeFromPause() {
  if (!paused || !pausedAt) return;
  pausedTotal += Date.now() - pausedAt.getTime();
  paused  = false;
  pausedAt = null;

  const labels = { study:'📚 Учусь', hw:'📝 Делаю ДЗ', coffee:'☕ Пью кофе', game:'🎮 Играю' };
  const colors = { study:'#22c55e', hw:'#3b82f6', coffee:'#f59e0b', game:'#8b5cf6' };
  const label = labels[currentAct];
  const color = colors[currentAct];

  $('btnPause').textContent = '☕ Перерыв';
  setTimerUI(currentAct, false);

  await sb.from('profiles').update({
    status: label, color, last_seen: nowIso()
  }).eq('id', me.id);
  toast(`▶ Продолжаем — ${label}`);
  fetchGroup();
}

/* ── END SESSION ───────────────────────────── */
window.endSession = async () => {
  if (!me) return;
  currentAct   = null;
  sessionStart = null;
  paused       = false;
  pausedAt     = null;
  pausedTotal  = 0;

  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
  disableControls();
  resetTimerUI();

  await sb.from('profiles').update({
    status: '🏠 Дома', color: '#94a3b8',
    session_started_at: null, last_seen: nowIso()
  }).eq('id', me.id);
  toast('✅ Сессия завершена');
  fetchGroup();
};

/* ── TIMER UI HELPERS ──────────────────────── */
function setTimerUI(key, isPaused) {
  const colors = { study:'#22c55e', hw:'#3b82f6', coffee:'#f59e0b', game:'#8b5cf6' };
  const labels = { study:'📚 Учусь', hw:'📝 Делаю ДЗ', coffee:'☕ Пью кофе', game:'🎮 Играю' };
  const icos   = { study:'📚', hw:'📝', coffee:'☕', game:'🎮' };
  const hints  = { study:'Время учёбы', hw:'Время на ДЗ', coffee:'Время за кофе', game:'Время в игре' };

  $('timerVal').style.color = isPaused ? '#f59e0b' : colors[key];
  $('timerIco').textContent = isPaused ? '☕' : icos[key];
  $('timerIco').className = 'timer-ico ' + (isPaused ? '' : (key === 'coffee' ? 'spin' : 'swing'));
  $('timerLabel').textContent = isPaused ? 'На паузе' : hints[key];
  $('myStatusText').textContent = labels[key];
}

function resetTimerUI() {
  $('timerVal').textContent = '0 сек.';
  $('timerVal').style.color = 'var(--muted)';
  $('timerIco').textContent = '⏱';
  $('timerIco').className = 'timer-ico';
  $('timerLabel').textContent = 'Нет активной сессии';
  $('myStatusText').textContent = 'Выбери действие ниже';
}

function enableControls() {
  $('btnPause').disabled = false;
  $('btnEnd').disabled   = false;
}

function disableControls() {
  $('btnPause').disabled = true;
  $('btnEnd').disabled   = true;
  $('btnPause').textContent = '☕ Перерыв';
}

/* ── GROUP MONITOR ─────────────────────────── */
async function fetchGroup() {
  const { data, error } = await sb.from('profiles').select('*').order('username');
  if (error || !data) return;

  const nowMs = Date.now();
  let onlineCount = 0;
  const newTimers = {};

  const html = data.map(u => {
    const isMe    = me && u.id === me.id;
    const color   = u.color || '#94a3b8';
    const lastSeen= u.last_seen ? new Date(u.last_seen).getTime() : 0;
    const isOnline= (nowMs - lastSeen) < ONLINE_MS;
    if (isOnline) onlineCount++;

    const hasTimer = u.session_started_at && u.status !== '🏠 Дома' && u.status !== '☕ Перерыв';
    if (hasTimer) newTimers[u.id] = new Date(u.session_started_at);
    const elapsed = hasTimer
      ? Math.floor((nowMs - new Date(u.session_started_at).getTime()) / 1000) : 0;

    return `
      <div class="mrow ${isOnline ? 'online-row' : ''}">
        <div class="mdot-wrap">
          <div class="mdot" style="background:${color};box-shadow:0 0 5px ${color};"></div>
          <div class="mdot-ripple ${isOnline ? 'on' : ''}" style="border-color:${color};"></div>
        </div>
        <span class="mname">
          ${esc(u.username || 'Без имени')}
          ${isMe ? '<span class="me-tag">(вы)</span>' : ''}
          ${isOnline ? '<span class="online-tag">онлайн</span>' : ''}
        </span>
        <div class="mright">
          <span class="mstatus">${esc(u.status || 'Нет статуса')}</span>
          <span class="mtimer ${hasTimer ? 'show' : ''}" id="mt-${u.id}">
            ${hasTimer ? '⏱ ' + fmtShort(elapsed) : ''}
          </span>
        </div>
      </div>`;
  }).join('');

  $('memberList').innerHTML = html ||
    '<p style="padding:14px;color:var(--muted);font-size:13px;text-align:center;">Участников нет</p>';

  // Merge timers
  for (const uid of Object.keys(memberTimers)) {
    if (!newTimers[uid]) delete memberTimers[uid];
  }
  Object.assign(memberTimers, newTimers);

  $('onlineCount').textContent = `${onlineCount} онлайн`;
  const t = new Date();
  $('lastUpdated').textContent =
    `Обновлено ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
}

/* ── CHAT ──────────────────────────────────── */
async function loadChat() {
  const { data, error } = await sb.from('messages')
    .select('*').order('created_at', { ascending: true }).limit(80);
  if (error) {
    console.error('Chat load error:', error);
    return;
  }
  renderMessages(data || []);
}

function renderMessages(msgs) {
  const box = $('chatMessages');
  if (!msgs.length) {
    box.innerHTML = '<div class="chat-empty">Сообщений пока нет</div>';
    return;
  }
  box.innerHTML = msgs.map(m => {
    const mine = me && m.user_id === me.id;
    return `<div class="cmsg ${mine ? 'mine' : ''}">
      <div class="cauthor">${esc(m.username || 'Аноним')}</div>
      <div class="cbubble">${esc(m.text)}</div>
    </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function appendMsg(m) {
  const box = $('chatMessages');
  const empty = box.querySelector('.chat-empty');
  if (empty) empty.remove();
  const mine = me && m.user_id === me.id;
  const div = document.createElement('div');
  div.className = `cmsg ${mine ? 'mine' : ''}`;
  div.innerHTML = `<div class="cauthor">${esc(m.username || 'Аноним')}</div>
                   <div class="cbubble">${esc(m.text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function subscribeChatRealtime() {
  if (chatSub) chatSub.unsubscribe();
  chatSub = sb.channel('chat-room')
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages'
    }, payload => appendMsg(payload.new))
    .subscribe();
}

window.sendMsg = async () => {
  if (!me) { toast('⚠️ Войдите в аккаунт'); return; }
  const input = $('chatInput');
  const text  = input.value.trim();
  if (!text) return;

  const name = me.user_metadata?.full_name || me.email?.split('@')[0] || 'Пользователь';
  input.value = '';

  const { error } = await sb.from('messages').insert({
    user_id:  me.id,
    username: name,
    text:     text
  });

  if (error) {
    console.error('Send error:', error);
    // Show the SQL hint
    toast('❌ Ошибка чата — смотри инструкцию ниже');
    input.value = text; // restore
  }
};
</script>
