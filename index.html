
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус группы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #e8eaed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        #myInfo {
            font-size: 14px;
            color: #444;
            margin-bottom: 16px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-btn {
            padding: 14px 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.15s, transform 0.1s;
            color: #fff;
        }

        .status-btn:hover {
            opacity: 0.88;
            transform: scale(0.98);
        }

        .status-btn:active {
            transform: scale(0.95);
        }

        .btn-study  { background: #3cb54a; }
        .btn-coffee { background: #f5a623; border: 2px solid #d4861a; }
        .btn-game   { background: #00b5ad; }
        .btn-home   { background: #888888; }

        #groupList {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .user-item strong {
            font-size: 15px;
            color: #1a1a1a;
            display: block;
        }

        .user-item small {
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Профиль -->
        <div class="card">
            <h2>Мой профиль</h2>
            <button onclick="login()">Login with Google</button>
            <script>
                async function login() {
                  const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: "google"
                  });
                }
            </script>
            <p id="myInfo">Загрузка...</p>

            <div class="status-grid">
                <button class="status-btn btn-study"  onclick="changeStatus('📚 Учусь', '#3cb54a')">📚 Учусь</button>
                <button class="status-btn btn-coffee" onclick="changeStatus('☕ Кофе-брейк', '#f5a623')">☕ Кофе</button>
                <button class="status-btn btn-game"   onclick="changeStatus('🎮 В игре', '#00b5ad')">🎮 В игре</button>
                <button class="status-btn btn-home"   onclick="changeStatus('🏠 Дома', '#888888')">🏠 Дома</button>
            </div>
        </div>

        <!-- Монитор группы -->
        <div class="card">
            <h2>Монитор группы</h2>
            <div id="groupList">Загрузка...</div>
        </div>
    </div> 

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://rvsatjlrxvbrnwzyhuip.supabase.co';
        const KEY = 'sb_publishable_hczXGnVXfEvYibWZxvmjzg_2fCbpiAS';
        const supabase = createClient(URL, KEY);

        const MY_ID = '04d89ec7-59eb-4ab5-8aba-8d143201306e';

        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        }

        fetchGroup();
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
