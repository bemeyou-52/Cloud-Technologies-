<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Группа · Монитор</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f4f6fb;
  --card:      #ffffff;
  --border:    #e8eaf0;
  --text:      #1a1d2e;
  --muted:     #8b8fa8;
  --green:     #22c55e;
  --green-bg:  #f0fdf4;
  --green-bd:  #bbf7d0;
  --red:       #ef4444;
  --red-bg:    #fff1f1;
  --red-bd:    #fecaca;
  --yellow:    #f59e0b;
  --yellow-bg: #fffbeb;
  --yellow-bd: #fde68a;
  --blue:      #3b82f6;
  --blue-bg:   #eff6ff;
  --blue-bd:   #bfdbfe;
  --radius:    16px;
  --shadow:    0 2px 16px rgba(0,0,0,0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Golos Text', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 28px 16px 60px;
  color: var(--text);
}

.wrap {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px 10px;
  font-family: 'Unbounded', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.4px;
  border-bottom: 1px solid var(--border);
}

.card-head .ico { font-size: 15px; }

.card-body { padding: 18px; }

/* ── LOGIN SCREEN ── */
#loginScreen {
  text-align: center;
  padding: 40px 24px;
}

#loginScreen h2 {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 6px;
  color: var(--text);
}

#loginScreen p {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.btn-google {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 13px 24px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Golos Text', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  width: 100%;
  justify-content: center;
}

.btn-google:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-google:active { transform: translateY(0); }

/* ── TIMER CARD ── */
.user-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 18px 14px;
}

.avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}

.avatar .online-dot {
  position: absolute;
  bottom: 1px; right: 1px;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--card);
}

.user-meta strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.user-meta small {
  font-size: 12px;
  color: var(--muted);
}

/* Big timer */
.timer-display {
  text-align: center;
  padding: 10px 18px 18px;
}

.timer-display .timer-ico {
  font-size: 28px;
  display: block;
  margin-bottom: 4px;
  animation: swing 2s ease-in-out infinite;
}

@keyframes swing {
  0%,100% { transform: rotate(-8deg); }
  50%      { transform: rotate(8deg); }
}

.timer-display .timer-val {
  font-family: 'Unbounded', sans-serif;
  font-size: 36px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}

.timer-display .timer-label {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.timer-display.paused .timer-val { color: var(--yellow); }
.timer-display.idle   .timer-val { color: var(--muted); }

/* Action buttons */
.action-grid {
  display: grid;
  gap: 10px;
  padding: 0 18px 18px;
}

.btn-finish {
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-family: 'Golos Text', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: filter 0.2s, transform 0.15s;
}

.btn-finish:hover { filter: brightness(0.92); transform: translateY(-1px); }
.btn-finish:active { transform: translateY(0); }

.btn-end-session {
  background: var(--red);
  color: #fff;
}

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-break {
  background: var(--yellow-bg);
  border: 1.5px solid var(--yellow-bd);
  color: #92400e;
}

.btn-logout-main {
  background: var(--border);
  border: 1.5px solid var(--border);
  color: var(--muted);
}

/* Status badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}

.status-badge.studying  { background: var(--green-bg);  color: #15803d; border: 1px solid var(--green-bd); }
.status-badge.break     { background: var(--yellow-bg); color: #92400e; border: 1px solid var(--yellow-bd); }
.status-badge.idle      { background: var(--bg);        color: var(--muted); border: 1px solid var(--border); }

/* ── GROUP MONITOR ── */
#memberList {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px 18px;
}

.member-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 10px;
  border: 1px solid var(--border);
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(5px); }
  to   { opacity:1; transform:translateY(0); }
}

.member-dot-wrap {
  position: relative;
  width: 12px; height: 12px;
  flex-shrink: 0;
}

.member-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  position: absolute;
  top: 1px; left: 1px;
}

.member-dot-ripple {
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  border: 1.5px solid;
  opacity: 0;
}

.member-dot-ripple.on {
  animation: ripple 2s infinite;
}

@keyframes ripple {
  0%   { transform:scale(1);   opacity:0.6; }
  100% { transform:scale(2.5); opacity:0; }
}

.member-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.member-name .me-tag {
  font-size: 10px;
  color: var(--blue);
  font-weight: 700;
  margin-left: 4px;
}

.member-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.member-status-text {
  font-size: 11px;
  color: var(--muted);
}

.member-timer {
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  font-variant-numeric: tabular-nums;
  display: none;
}

.member-timer.show { display: block; }

.online-tag {
  display: inline-block;
  background: var(--green-bg);
  color: #15803d;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 8px;
  border: 1px solid var(--green-bd);
  margin-left: 4px;
  vertical-align: middle;
}

.refresh-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 18px 14px;
}

.refresh-row span {
  font-size: 11px;
  color: var(--muted);
}

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2.5s infinite;
}

@keyframes blink {
  0%,90%,100% { opacity:1; }
  95%          { opacity:0; }
}

.online-count-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px 0;
  font-size: 12px;
  font-weight: 600;
  color: #15803d;
}

.online-count-bar .pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-g 2s infinite;
}

@keyframes pulse-g {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
}

.skeleton {
  height: 46px;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── CHAT ── */
.chat-messages {
  height: 200px;
  overflow-y: auto;
  padding: 14px 18px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chat-msg {
  animation: fadeUp 0.25s ease;
}

.chat-msg .msg-author {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 2px;
}

.chat-msg.mine .msg-author { color: var(--green); text-align: right; }
.chat-msg.mine .msg-bubble { margin-left: auto; background: var(--green-bg); border-color: var(--green-bd); }

.msg-bubble {
  display: inline-block;
  max-width: 85%;
  padding: 7px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.4;
  color: var(--text);
  word-break: break-word;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border);
}

.chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Golos Text', sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.chat-input::placeholder { color: var(--muted); }
.chat-input:focus { border-color: #94a3b8; }

.btn-send {
  width: 40px; height: 40px;
  border: none;
  border-radius: 10px;
  background: var(--green);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: filter 0.2s, transform 0.15s;
}

.btn-send:hover { filter: brightness(0.9); transform: scale(1.05); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.chat-empty {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 30px 0;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}

#toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN -->
  <div class="card" id="loginScreen">
    <div style="font-size:48px; margin-bottom:16px;">🎓</div>
    <h2>Монитор группы</h2>
    <p>Отслеживайте кто учится прямо сейчас, делайте перерывы и общайтесь в чате</p>
    <button class="btn-google" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z" fill="#FFC107"/>
        <path d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 7.5 29.6 5 24 5 16.2 5 9.4 9.1 6.3 14.7z" fill="#FF3D00"/>
        <path d="M24 44c5.5 0 10.4-2 14.1-5.2l-6.5-5.5C29.6 35.1 26.9 36 24 36c-5.3 0-9.7-3.3-11.4-8H6.1C9.2 34.9 16 40 24 40v4z" fill="#4CAF50"/>
        <path d="M43.6 20.5H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.6 5.9l6.5 5.5C37 39 44 34 44 24c0-1.2-.1-2.4-.4-3.5z" fill="#1976D2"/>
      </svg>
      Войти через Google
    </button>
  </div>

  <!-- MAIN APP (hidden until logged in) -->
  <div id="mainApp" class="hidden">

    <!-- Session timer card -->
    <div class="card">
      <div class="user-header">
        <div class="avatar" id="avatarEmoji">🦊<div class="online-dot"></div></div>
        <div class="user-meta">
          <strong id="myName">—</strong>
          <div style="margin-top:4px;" id="myBadge"><span class="status-badge idle">Нет сессии</span></div>
        </div>
      </div>

      <div class="timer-display idle" id="timerDisplay">
        <span class="timer-ico" id="timerIco">⏱</span>
        <div class="timer-val" id="timerVal">0 сек.</div>
        <div class="timer-label" id="timerLabel">Нажми «Начать сессию» чтобы начать</div>
      </div>

      <div class="action-grid">
        <!-- State: idle → show Start; studying/paused → show End -->
        <button class="btn-finish btn-end-session hidden" id="btnEndSession" onclick="endSession()">
          ⛔ Завершить сессию
        </button>
        <button class="btn-finish btn-end-session" id="btnStartSession"
                style="background:var(--green);" onclick="startSession()">
          🚀 Начать сессию
        </button>
        <div class="btn-row">
          <button class="btn-finish btn-break hidden" id="btnBreak" onclick="toggleBreak()">
            ☕ Перерыв
          </button>
          <button class="btn-finish btn-logout-main" onclick="doLogout()">
            🚪 Выход
          </button>
        </div>
      </div>
    </div>

    <!-- Group monitor -->
    <div class="card">
      <div class="card-head"><span class="ico">👥</span> Монитор группы</div>
      <div class="online-count-bar">
        <div class="pulse-dot"></div>
        <span id="onlineCount">0 онлайн</span>
      </div>
      <div id="memberList">
        <div style="padding:8px 0;"><div class="skeleton"></div></div>
        <div style="padding:4px 0;"><div class="skeleton"></div></div>
        <div style="padding:4px 0;"><div class="skeleton"></div></div>
      </div>
      <div class="refresh-row">
        <span id="lastUpdated">Загрузка...</span>
        <div class="live-dot"></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="card">
      <div class="card-head"><span class="ico">💬</span> Общий чат</div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">Сообщений пока нет</div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="Сообщение..."
               onkeydown="if(event.key==='Enter')sendMsg()" maxlength="300">
        <button class="btn-send" id="btnSend" onclick="sendMsg()">➤</button>
      </div>
    </div>

  </div><!-- /mainApp -->
</div><!-- /wrap -->

<div id="toast"></div>

<!-- ════════════════════ SCRIPT ════════════════════ -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

/* ── CONFIG ─────────────────────────────────────── */
const SUPABASE_URL  = 'https://rvsatjlrxvbrnwzyhuip.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2c2F0amxyeHZicm53enlodWlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzcxMjAsImV4cCI6MjA4ODk1MzEyMH0.k18RyeTEL_UySmgeSIIQ__-Ko_fQ4HnbXsPQtVaM0E0';
const ONLINE_MS     = 15000;   // считать онлайн если last_seen < 15с назад
const HEARTBEAT_MS  = 8000;    // как часто обновлять last_seen
const REFRESH_MS    = 5000;    // как часто опрашивать группу

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── STATE ──────────────────────────────────────── */
let me = null;                // supabase user
let myProfile = null;         // row from profiles
let sessionStart = null;      // Date — начало текущей сессии
let sessionStatus = 'idle';   // idle | studying | paused
let memberTimers = {};        // uid -> Date (study_started_at)
let heartbeatTimer = null;
let chatSub = null;

/* ── HELPERS ─────────────────────────────────────── */
const $  = id => document.getElementById(id);
const fmt = s => {
  if (s < 60) return `${s} сек.`;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}ч ${m}м ${sec}с`;
  return `${m}м ${sec}с`;
};
const fmtShort = s => {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return `${h}ч ${m}м ${sec}с`;
};
const now = () => new Date().toISOString();
const EMOJIS = ['🦊','🐼','🦁','🐨','🦋','🐙','🦄','🐸','🐯','🦝'];

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── SESSION TIMER (ticks every second) ──────────── */
setInterval(() => {
  // My session timer
  if (sessionStart && sessionStatus !== 'idle') {
    const elapsed = Math.floor((Date.now() - sessionStart.getTime()) / 1000);
    $('timerVal').textContent = fmt(elapsed);
  }
  // All member study timers in group list
  for (const [uid, start] of Object.entries(memberTimers)) {
    const el = document.getElementById(`mt-${uid}`);
    if (!el) continue;
    const elapsed = Math.floor((Date.now() - start.getTime()) / 1000);
    el.textContent = '⏱ ' + fmtShort(elapsed);
  }
}, 1000);

/* ── AUTH ────────────────────────────────────────── */
window.doLogin = async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if (error) { toast('❌ Ошибка входа'); console.error(error); }
};

window.doLogout = async () => {
  // Mark offline
  if (me) await sb.from('profiles').update({ status: '🏠 Дома', last_seen: null, session_started_at: null }).eq('id', me.id);
  await sb.auth.signOut();
  me = null; myProfile = null; sessionStatus = 'idle'; sessionStart = null;
  clearInterval(heartbeatTimer);
  if (chatSub) chatSub.unsubscribe();
  $('loginScreen').classList.remove('hidden');
  $('mainApp').classList.add('hidden');
};

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    me = session.user;
    await initApp();
  }
});

/* ── INIT ─────────────────────────────────────────── */
async function initApp() {
  $('loginScreen').classList.add('hidden');
  $('mainApp').classList.remove('hidden');

  // Upsert profile
  const name = me.user_metadata?.full_name || me.email?.split('@')[0] || 'Пользователь';
  await sb.from('profiles').upsert({
    id: me.id, username: name,
    status: '🏠 Дома', color: '#22c55e',
    last_seen: now()
  }, { onConflict: 'id', ignoreDuplicates: true });

  // Load my profile
  const { data } = await sb.from('profiles').select('*').eq('id', me.id).single();
  myProfile = data;

  // Restore session if was studying
  if (data?.session_started_at && (data?.status?.includes('Учусь') || data?.status?.includes('Перерыв'))) {
    sessionStart = new Date(data.session_started_at);
    if (data.status.includes('Перерыв')) {
      sessionStatus = 'paused';
    } else {
      sessionStatus = 'studying';
    }
    applySessionUI();
  }

  // Set name + emoji
  const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  $('avatarEmoji').innerHTML = emoji + '<div class="online-dot"></div>';
  $('myName').textContent = name;

  // Start heartbeat
  clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(heartbeat, HEARTBEAT_MS);
  await heartbeat();

  // Load group + chat
  await fetchGroup();
  setInterval(fetchGroup, REFRESH_MS);
  await loadChat();
  subscribeChatRealtime();
}

/* ── HEARTBEAT ──────────────────────────────────── */
async function heartbeat() {
  if (!me) return;
  await sb.from('profiles').update({ last_seen: now() }).eq('id', me.id);
}

/* ── SESSION ACTIONS ────────────────────────────── */
window.startSession = async () => {
  if (!me) return;
  sessionStart = new Date();
  sessionStatus = 'studying';
  await sb.from('profiles').update({
    status: '📚 Учусь',
    color: '#22c55e',
    session_started_at: sessionStart.toISOString(),
    last_seen: now()
  }).eq('id', me.id);
  applySessionUI();
  toast('🚀 Сессия началась!');
  fetchGroup();
};

window.endSession = async () => {
  if (!me) return;
  sessionStart = null;
  sessionStatus = 'idle';
  await sb.from('profiles').update({
    status: '🏠 Дома',
    color: '#94a3b8',
    session_started_at: null,
    last_seen: now()
  }).eq('id', me.id);
  applySessionUI();
  toast('✅ Сессия завершена');
  fetchGroup();
};

window.toggleBreak = async () => {
  if (!me || sessionStatus === 'idle') return;
  if (sessionStatus === 'studying') {
    sessionStatus = 'paused';
    await sb.from('profiles').update({ status: '☕ Перерыв', color: '#f59e0b', last_seen: now() }).eq('id', me.id);
    toast('☕ Перерыв');
  } else {
    sessionStatus = 'studying';
    await sb.from('profiles').update({ status: '📚 Учусь', color: '#22c55e', last_seen: now() }).eq('id', me.id);
    toast('📚 Вернулся к учёбе');
  }
  applySessionUI();
  fetchGroup();
};

function applySessionUI() {
  const td = $('timerDisplay');
  const btnStart = $('btnStartSession');
  const btnEnd   = $('btnEndSession');
  const btnBreak = $('btnBreak');
  const badge    = $('myBadge');

  if (sessionStatus === 'idle') {
    td.className = 'timer-display idle';
    $('timerIco').textContent = '⏱';
    $('timerVal').textContent = '0 сек.';
    $('timerLabel').textContent = 'Нажми «Начать сессию» чтобы начать';
    btnStart.classList.remove('hidden');
    btnEnd.classList.add('hidden');
    btnBreak.classList.add('hidden');
    badge.innerHTML = '<span class="status-badge idle">Нет сессии</span>';
  } else if (sessionStatus === 'studying') {
    td.className = 'timer-display studying';
    $('timerIco').textContent = '📚';
    $('timerLabel').textContent = 'Время учёбы в текущей сессии';
    btnStart.classList.add('hidden');
    btnEnd.classList.remove('hidden');
    btnBreak.classList.remove('hidden');
    btnBreak.textContent = '☕ Перерыв';
    badge.innerHTML = '<span class="status-badge studying">📚 Учусь</span>';
  } else if (sessionStatus === 'paused') {
    td.className = 'timer-display paused';
    $('timerIco').textContent = '☕';
    $('timerLabel').textContent = 'Перерыв · таймер на паузе';
    btnStart.classList.add('hidden');
    btnEnd.classList.remove('hidden');
    btnBreak.classList.remove('hidden');
    btnBreak.textContent = '📚 Продолжить';
    badge.innerHTML = '<span class="status-badge break">☕ Перерыв</span>';
  }
}

/* ── GROUP MONITOR ──────────────────────────────── */
async function fetchGroup() {
  const { data, error } = await sb.from('profiles').select('*').order('username');
  if (error || !data) return;

  const nowMs = Date.now();
  let onlineCount = 0;
  const newTimers = {};

  const html = data.map(u => {
    const isMe = me && u.id === me.id;
    const color = u.color || '#94a3b8';
    const lastSeen = u.last_seen ? new Date(u.last_seen).getTime() : 0;
    const isOnline = (nowMs - lastSeen) < ONLINE_MS;
    if (isOnline) onlineCount++;

    const isStudying = u.status?.includes('Учусь') && u.session_started_at;
    if (isStudying) newTimers[u.id] = new Date(u.session_started_at);

    const elapsed = isStudying
      ? Math.floor((nowMs - new Date(u.session_started_at).getTime()) / 1000)
      : 0;

    return `
      <div class="member-row">
        <div class="member-dot-wrap">
          <div class="member-dot" style="background:${color}; box-shadow:0 0 5px ${color};"></div>
          <div class="member-dot-ripple ${isOnline ? 'on' : ''}" style="border-color:${color};"></div>
        </div>
        <span class="member-name">
          ${u.username || 'Без имени'}
          ${isMe ? '<span class="me-tag">(вы)</span>' : ''}
          ${isOnline ? '<span class="online-tag">онлайн</span>' : ''}
        </span>
        <div class="member-right">
          <span class="member-status-text">${u.status || 'Нет статуса'}</span>
          <span class="member-timer ${isStudying ? 'show' : ''}" id="mt-${u.id}">
            ${isStudying ? '⏱ ' + fmtShort(elapsed) : ''}
          </span>
        </div>
      </div>`;
  }).join('');

  $('memberList').innerHTML = html || '<p style="padding:14px;color:var(--muted);font-size:13px;text-align:center;">Участников пока нет</p>';

  // Update timers map (preserve my own if active)
  if (me && memberTimers[me.id]) newTimers[me.id] = memberTimers[me.id];
  for (const uid of Object.keys(memberTimers)) {
    if (!newTimers[uid]) delete memberTimers[uid];
  }
  Object.assign(memberTimers, newTimers);

  $('onlineCount').textContent = onlineCount === 1 ? '1 онлайн' : `${onlineCount} онлайн`;
  const t = new Date();
  $('lastUpdated').textContent = `Обновлено ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
}

/* ── CHAT ────────────────────────────────────────── */
async function loadChat() {
  const { data, error } = await sb.from('messages')
    .select('*').order('created_at', { ascending: true }).limit(60);
  if (error) { console.error(error); return; }
  renderMessages(data || []);
}

function renderMessages(msgs) {
  const box = $('chatMessages');
  if (!msgs.length) {
    box.innerHTML = '<div class="chat-empty">Сообщений пока нет</div>';
    return;
  }
  box.innerHTML = msgs.map(m => {
    const mine = me && m.user_id === me.id;
    return `
      <div class="chat-msg ${mine ? 'mine' : ''}">
        <div class="msg-author">${m.username || 'Аноним'}</div>
        <div class="msg-bubble">${escHtml(m.text)}</div>
      </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function subscribeChatRealtime() {
  if (chatSub) chatSub.unsubscribe();
  chatSub = sb
    .channel('messages-channel')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
      appendMessage(payload.new);
    })
    .subscribe();
}

function appendMessage(msg) {
  const box = $('chatMessages');
  const empty = box.querySelector('.chat-empty');
  if (empty) empty.remove();
  const mine = me && msg.user_id === me.id;
  const div = document.createElement('div');
  div.className = `chat-msg ${mine ? 'mine' : ''}`;
  div.innerHTML = `<div class="msg-author">${msg.username || 'Аноним'}</div>
                   <div class="msg-bubble">${escHtml(msg.text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

window.sendMsg = async () => {
  if (!me) { toast('⚠️ Войдите в аккаунт'); return; }
  const input = $('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const name = me.user_metadata?.full_name || me.email?.split('@')[0] || 'Пользователь';
  const { error } = await sb.from('messages').insert({
    user_id: me.id, username: name, text
  });
  if (error) { toast('❌ Ошибка отправки'); console.error(error); }
};

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── BOOT ─────────────────────────────────────────── */
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    me = session.user;
    await initApp();
  }
})();
</script>
